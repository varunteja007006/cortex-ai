services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: next_rag_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-next_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-next_rag}
      POSTGRES_DB: ${POSTGRES_DB:-next_rag}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-next_rag} -d ${POSTGRES_DB:-next_rag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: next_rag_valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  valkey_data:
